spring.application.name=forensic-analyzer
server.port=8080

# 1. CONNECT SPRING BOOT TO YOUR OLLAMA TERMINAL
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5:0.5b

# 2. CONNECT TO YOUR SQL DATABASE
# (Change 'mysql' to 'postgresql' in the URL if you use Postgres instead!)
spring.datasource.url=jdbc:mysql://localhost:3306/forensic_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=7548

#2. Database Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Explicitly tell Hibernate which Dialect to use so it doesn't have to guess!
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration